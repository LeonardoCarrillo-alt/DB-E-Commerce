# MongoDB connection
quarkus.mongodb.connection-string=mongodb://admin:admin123@localhost:27017/ecommerce_multitienda?authSource=admin&retryWrites=false
quarkus.mongodb.database=ecommerce_multitienda
quarkus.mongodb.min-pool-size=5
quarkus.mongodb.max-pool-size=20

# HTTP
quarkus.http.port=8080

# Jackson
quarkus.jackson.property-naming-strategy=SNAKE_CASE
quarkus.jackson.fail-on-unknown-properties=false

# JWT
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=https://bo.com.proj/ecommerce
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.new-token.lifespan=3600

# PostgreSQL API Clients
postgresql-api/mp-rest/url=http://localhost:8082
quarkus.rest-client.postgresql-api.url=http://localhost:8082
postgresql-api/mp-rest/scope=jakarta.inject.Singleton
postgresql-api/mp-rest/connect-timeout=5000
postgresql-api/mp-rest/read-timeout=5000

pedidos-api/mp-rest/url=http://localhost:8082
quarkus.rest-client.pedidos-api.url=http://localhost:8082
pedidos-api/mp-rest/scope=jakarta.inject.Singleton
pedidos-api/mp-rest/connect-timeout=5000
pedidos-api/mp-rest/read-timeout=5000

# Security
quarkus.http.auth.permission.public.paths=/auth/*,/productos/*,/busqueda/*,/promociones/vigentes,/q/*
quarkus.http.auth.permission.public.policy=permit

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-invitado,x-session-id

# Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.enable=true
quarkus.smallrye-openapi.enable=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."bo.com.proj".level=DEBUG

# Dev profile
%dev.quarkus.http.port=8080
%dev.quarkus.log.level=DEBUG
