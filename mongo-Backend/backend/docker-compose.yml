version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: postgres-ecommerce
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
