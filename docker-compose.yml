version: '3.8'

services:
  mongodb:
    image: mongo:8
    container_name: mongo-ecommerce-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ecommerce_multitienda
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-Backend/mongo-e-commerce/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongo-data:/data/db
    networks:
      - ecommerce-net

  postgres:
    image: postgres:16
    container_name: mongo-ecommerce-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-net

  mongo-backend:
    build:
      context: ./mongo-Backend/mongo-e-commerce
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: mongo-ecommerce-mongo-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - postgres
    environment:
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://admin:admin123@mongodb:27017/ecommerce_multitienda?authSource=admin&retryWrites=false
      QUARKUS_MONGODB_DATABASE: ecommerce_multitienda
      QUARKUS_REST_CLIENT_POSTGRESQL_API_URL: http://postgres-backend:8082
      QUARKUS_HTTP_PORT: 8080
    networks:
      - ecommerce-net

  postgres-backend:
    build:
      context: ./mongo-Backend/backend
      dockerfile: ../mongo-e-commerce/src/main/docker/Dockerfile.jvm
    container_name: mongo-ecommerce-postgres-backend
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/ecommerce_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: admin123
    networks:
      - ecommerce-net

volumes:
  mongo-data:
  postgres-data:

networks:
  ecommerce-net:
    driver: bridge
